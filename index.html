<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChatX</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --border: #1e1e2e;
    --accent: #00ff88;
    --accent2: #00aaff;
    --text: #e8e8f0;
    --muted: #555570;
    --msg-mine: #00ff8820;
    --msg-other: #1a1a2e;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: 
      radial-gradient(ellipse 80% 50% at 20% 0%, #00ff8808 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 80% 100%, #00aaff08 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  #login-screen {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    background: var(--bg);
  }

  .login-box {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 40px 36px;
    width: 100%;
    max-width: 380px;
    position: relative;
  }

  .login-box::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
  }

  .login-logo {
    font-size: 2.5rem;
    font-weight: 800;
    letter-spacing: -2px;
    margin-bottom: 4px;
  }

  .login-logo span { color: var(--accent); }

  .login-sub {
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    margin-bottom: 28px;
    letter-spacing: 2px;
  }

  .tab-bar {
    display: flex;
    margin-bottom: 20px;
    border: 1px solid var(--border);
  }

  .tab-btn {
    flex: 1;
    padding: 10px;
    border: none;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    cursor: pointer;
    font-size: 0.85rem;
    letter-spacing: 1px;
    transition: all 0.2s;
  }

  .tab-btn.active { background: var(--accent); color: #000; }
  .tab-btn.inactive { background: transparent; color: var(--muted); }

  .login-box input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 13px 16px;
    font-family: 'Syne', sans-serif;
    font-size: 1rem;
    outline: none;
    transition: border-color 0.2s;
    margin-bottom: 10px;
  }

  .login-box input:focus { border-color: var(--accent); }
  .login-box input::placeholder { color: var(--muted); }

  .error-msg {
    font-family: 'Space Mono', monospace;
    font-size: 0.68rem;
    color: #ff4466;
    margin-bottom: 10px;
    min-height: 18px;
  }

  .login-btn {
    width: 100%;
    background: var(--accent);
    color: #000;
    border: none;
    padding: 14px;
    font-family: 'Syne', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 1px;
    transition: opacity 0.2s, transform 0.1s;
  }

  .login-btn:hover { opacity: 0.85; }
  .login-btn:active { transform: scale(0.98); }
  .login-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  #app {
    display: none;
    flex-direction: column;
    height: 100vh;
    position: relative;
    z-index: 1;
  }

  header {
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--surface);
    flex-shrink: 0;
  }

  .header-left { display: flex; align-items: center; gap: 12px; }

  .logo { font-size: 1.4rem; font-weight: 800; letter-spacing: -1px; }
  .logo span { color: var(--accent); }

  .room-badge {
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    color: var(--accent);
    background: #00ff8815;
    border: 1px solid #00ff8830;
    padding: 3px 10px;
    letter-spacing: 1px;
  }

  .online-count {
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .dot {
    width: 6px; height: 6px;
    background: var(--accent);
    border-radius: 50%;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .user-info {
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    color: var(--muted);
  }

  .user-info strong { color: var(--accent2); }

  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    scroll-behavior: smooth;
  }

  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb { background: var(--border); }

  .msg {
    display: flex;
    flex-direction: column;
    max-width: 70%;
    animation: msgIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  @keyframes msgIn {
    from { opacity: 0; transform: translateY(10px) scale(0.95); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  .msg.mine { align-self: flex-end; align-items: flex-end; }
  .msg.other { align-self: flex-start; align-items: flex-start; }

  .msg-name {
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    color: var(--muted);
    margin-bottom: 4px;
    letter-spacing: 1px;
  }

  .msg.mine .msg-name { color: var(--accent2); }

  .msg-bubble {
    padding: 10px 16px;
    font-size: 0.95rem;
    line-height: 1.5;
  }

  .msg.mine .msg-bubble {
    background: var(--msg-mine);
    border: 1px solid #00ff8830;
    border-radius: 12px 12px 2px 12px;
  }

  .msg.other .msg-bubble {
    background: var(--msg-other);
    border: 1px solid var(--border);
    border-radius: 12px 12px 12px 2px;
  }

  .msg-time {
    font-family: 'Space Mono', monospace;
    font-size: 0.6rem;
    color: var(--muted);
    margin-top: 4px;
  }

  .sys-msg {
    text-align: center;
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 1px;
    padding: 4px 0;
  }

  footer {
    padding: 16px 24px;
    border-top: 1px solid var(--border);
    background: var(--surface);
    display: flex;
    gap: 12px;
    align-items: center;
    flex-shrink: 0;
  }

  #input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 12px 16px;
    font-family: 'Syne', sans-serif;
    font-size: 0.95rem;
    outline: none;
    transition: border-color 0.2s;
    border-radius: 4px;
  }

  #input:focus { border-color: var(--accent); }
  #input::placeholder { color: var(--muted); }

  #send-btn {
    background: var(--accent);
    color: #000;
    border: none;
    width: 44px; height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    border-radius: 4px;
    transition: opacity 0.2s, transform 0.1s;
    flex-shrink: 0;
  }

  #send-btn:hover { opacity: 0.85; }
  #send-btn:active { transform: scale(0.93); }
  #send-btn svg { width: 18px; height: 18px; }

  .typing-indicator {
    display: none;
    align-items: center;
    gap: 6px;
    padding: 0 24px;
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    color: var(--muted);
    height: 24px;
    flex-shrink: 0;
  }

  .typing-dots span {
    display: inline-block;
    width: 4px; height: 4px;
    background: var(--muted);
    border-radius: 50%;
    animation: typingDot 1.2s infinite;
  }

  .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes typingDot {
    0%, 80%, 100% { transform: scale(0.8); opacity: 0.4; }
    40% { transform: scale(1.2); opacity: 1; }
  }
</style>
</head>
<body>

<!-- LOGIN / REGISTER -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">Chat<span>X</span></div>
    <div class="login-sub">// REALTIME MESSAGING</div>

    <div class="tab-bar">
      <button class="tab-btn active" id="tab-login" onclick="switchTab('login')">LOGIN</button>
      <button class="tab-btn inactive" id="tab-register" onclick="switchTab('register')">REGISTER</button>
    </div>

    <input type="text" id="username-input" placeholder="Nama kamu..." maxlength="20" />
    <input type="password" id="pin-input" placeholder="PIN 4 angka..." maxlength="4" inputmode="numeric" />
    <div class="error-msg" id="error-msg"></div>
    <button class="login-btn" id="action-btn" onclick="handleAuth()">MASUK →</button>
  </div>
</div>

<!-- APP -->
<div id="app">
  <header>
    <div class="header-left">
      <div class="logo">Chat<span>X</span></div>
      <div class="room-badge"># GLOBAL</div>
      <div class="online-count"><div class="dot"></div><span id="online-count">1 online</span></div>
    </div>
    <div class="user-info">logged as <strong id="display-username"></strong></div>
  </header>

  <div id="messages"></div>

  <div class="typing-indicator" id="typing-indicator">
    <div class="typing-dots"><span></span><span></span><span></span></div>
    <span id="typing-text"></span>
  </div>

  <footer>
    <input type="text" id="input" placeholder="Ketik pesan..." maxlength="500" />
    <button id="send-btn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"></line>
        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
      </svg>
    </button>
  </footer>
</div>

<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
  import { getDatabase, ref, push, onValue, set, get, remove, onDisconnect } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js';

  const firebaseConfig = {
    apiKey: "AIzaSyDUmhjXaatxyWoBK01sN3KtxvytCK52Z1s",
    authDomain: "obanchat.firebaseapp.com",
    databaseURL: "https://obanchat-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "obanchat",
    storageBucket: "obanchat.firebasestorage.app",
    messagingSenderId: "158148882391",
    appId: "1:158148882391:web:63e188813ae68768e06592"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  let myUsername = '';
  let currentTab = 'login';
  let typingTimeout;

  window.switchTab = function(tab) {
    currentTab = tab;
    document.getElementById('tab-login').className = 'tab-btn ' + (tab === 'login' ? 'active' : 'inactive');
    document.getElementById('tab-register').className = 'tab-btn ' + (tab === 'register' ? 'active' : 'inactive');
    document.getElementById('action-btn').textContent = tab === 'login' ? 'MASUK →' : 'DAFTAR →';
    document.getElementById('error-msg').textContent = '';
    document.getElementById('username-input').value = '';
    document.getElementById('pin-input').value = '';
  }

  window.handleAuth = async function() {
    const username = document.getElementById('username-input').value.trim().toLowerCase();
    const pin = document.getElementById('pin-input').value.trim();
    const errEl = document.getElementById('error-msg');
    const btn = document.getElementById('action-btn');

    errEl.textContent = '';

    if (!username) { errEl.textContent = '⚠ Nama tidak boleh kosong'; return; }
    if (!/^\d{4}$/.test(pin)) { errEl.textContent = '⚠ PIN harus tepat 4 angka'; return; }

    btn.disabled = true;
    btn.textContent = 'Loading...';

    try {
      const userRef = ref(db, `chatx/users/${username}`);
      const snapshot = await get(userRef);

      if (currentTab === 'register') {
        if (snapshot.exists()) {
          errEl.textContent = '⚠ Nama sudah digunakan, coba nama lain';
          btn.disabled = false;
          btn.textContent = 'DAFTAR →';
          return;
        }
        await set(userRef, { pin, createdAt: Date.now() });
        myUsername = username;
        startChat();

      } else {
        if (!snapshot.exists()) {
          errEl.textContent = '⚠ Nama tidak ditemukan, silakan register dulu';
          btn.disabled = false;
          btn.textContent = 'MASUK →';
          return;
        }
        const data = snapshot.val();
        if (data.pin !== pin) {
          errEl.textContent = '⚠ PIN salah, coba lagi';
          btn.disabled = false;
          btn.textContent = 'MASUK →';
          return;
        }
        myUsername = username;
        startChat();
      }
    } catch(e) {
      errEl.textContent = '⚠ Gagal terhubung ke server';
      btn.disabled = false;
      btn.textContent = currentTab === 'login' ? 'MASUK →' : 'DAFTAR →';
    }
  }

  document.getElementById('pin-input').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') window.handleAuth();
  });
  document.getElementById('username-input').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') document.getElementById('pin-input').focus();
  });

  function startChat() {
    const messagesRef = ref(db, 'chatx/global/messages');
    const typingRef = ref(db, `chatx/global/typing/${myUsername}`);
    const presenceRef = ref(db, `chatx/global/presence/${myUsername}`);

    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    document.getElementById('display-username').textContent = myUsername;

    set(presenceRef, true);
    onDisconnect(presenceRef).remove();

    onValue(ref(db, 'chatx/global/presence'), (snap) => {
      let count = 0;
      snap.forEach(() => count++);
      document.getElementById('online-count').textContent = count + ' online';
    });

    onValue(messagesRef, (snapshot) => {
      const msgs = document.getElementById('messages');
      msgs.innerHTML = '';
      snapshot.forEach(child => {
        const data = child.val();
        if (data.system) {
          addSystemMsg(data.text);
        } else {
          addMessage(data.username, data.text, data.username === myUsername, data.time);
        }
      });
      msgs.scrollTop = msgs.scrollHeight;
    });

    onValue(ref(db, 'chatx/global/typing'), (snapshot) => {
      const typers = [];
      snapshot.forEach(child => {
        if (child.key !== myUsername) typers.push(child.key);
      });
      const ti = document.getElementById('typing-indicator');
      if (typers.length > 0) {
        ti.style.display = 'flex';
        document.getElementById('typing-text').textContent = typers.join(', ') + ' sedang mengetik...';
      } else {
        ti.style.display = 'none';
      }
    });

    push(messagesRef, { system: true, text: `${myUsername} bergabung ke chat` });

    document.getElementById('input').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') { sendMsg(); return; }
      set(typingRef, true);
      clearTimeout(typingTimeout);
      typingTimeout = setTimeout(() => remove(typingRef), 2000);
    });

    window.sendMessage = sendMsg;

    function sendMsg() {
      const input = document.getElementById('input');
      const text = input.value.trim();
      if (!text) return;
      push(messagesRef, {
        username: myUsername,
        text,
        time: new Date().toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' })
      });
      remove(typingRef);
      clearTimeout(typingTimeout);
      input.value = '';
    }
  }

  function addMessage(username, text, mine, time) {
    const msgs = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'msg ' + (mine ? 'mine' : 'other');
    div.innerHTML = `
      <div class="msg-name">${username}</div>
      <div class="msg-bubble">${escapeHtml(text)}</div>
      <div class="msg-time">${time || ''}</div>
    `;
    msgs.appendChild(div);
  }

  function addSystemMsg(text) {
    const msgs = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'sys-msg';
    div.textContent = '— ' + text + ' —';
    msgs.appendChild(div);
  }

  function escapeHtml(text) {
    return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
</script>

</body>
</html>
